# E&E UK — Kitty terminal config (Theme import)
# Theme colors loaded at runtime. Everything else inline.

include ~/.config/omarchy/current/theme/kitty.conf

font_family JetBrainsMono Nerd Font Mono
bold_font JetBrainsMono Nerd Font Mono Bold
italic_font JetBrainsMono Nerd Font Mono Italic
font_size 9

window_padding_width 14
hide_window_decorations yes

cursor_shape block
cursor_blink_interval 0

scrollback_lines 10000
scrollback_pager_history_size 128
scrollback_pager nvim -u NONE --headless -c 'set nonumber norelativenumber nolist' -c 'call nvim_open_term(0, {})' -c 'nnoremap q :q!<CR>' -

allow_remote_control socket-only
listen_on unix:/tmp/kitty

shell_integration enabled

map shift+insert paste_from_selection
map ctrl+insert copy_to_clipboard

# Scrollback pager
map ctrl+shift+h show_scrollback
