# E&E UK ‚Äî Night light / blue light filter
# Inherit‚Üíoverride. Disables default tint, provides night light profile stub.

# Makes hyprsunset do nothing to the screen by default
# Without this, the default applies some tint to the monitor
profile {
    time = 07:00
    identity = true
}

# To enable auto switch to nightlight, uncomment in autostart.conf:
# exec-once = uwsm-app -- hyprsunset
# and use the following:
# profile {
#     time = 20:00
#     temperature = 4000
# }
