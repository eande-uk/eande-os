# E&E UK — Input/device overrides (Layer 3 override)

input {
    kb_options = compose:ralt

    repeat_rate = 40
    repeat_delay = 250

    numlock_by_default = true

    touchpad {
        clickfinger_behavior = true
        scroll_factor = 0.4
    }
}

windowrule = match:class (Alacritty|kitty|foot), scroll_touchpad 1.5
