# E&E UK â€” Idle pipeline: dim â†’ lock â†’ screensaver â†’ DPMS off
# Inheritâ†’override. Extends Omarchy stock idle pipeline with custom timeouts.
# References erch-system-idle / erch-system-idle-resume.

general {
    lock_cmd = erch-system-lock
    before_sleep_cmd = ERCH_LOCK_ONLY=true erch-system-lock
    after_sleep_cmd = sleep 1 && erch-system-wake
    inhibit_sleep = 3
}

# Start screensaver after 2.5 minutes
listener {
    timeout = 150
    on-timeout = pidof hyprlock || erch-launch-screensaver
}

# Re-trigger screensaver after 5 minutes (in case dismissed)
listener {
    timeout = 300
    on-timeout = pidof hyprlock || erch-launch-screensaver
}

# Idle pipeline after 2.5 minutes: lock, dim keyboard, DPMS off after 10s
listener {
    timeout = 152
    on-timeout = erch-system-idle
    on-resume = erch-system-idle-resume
    on-timeout = erch-system-lock
    on-resume = erch-system-wake
}

# DPMS force off after 7 minutes
listener {
    timeout = 430
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}
