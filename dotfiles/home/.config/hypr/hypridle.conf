# E&E UK ŌĆö Idle pipeline: dim ŌåÆ lock ŌåÆ screensaver ŌåÆ DPMS off
# InheritŌåÆoverride. Extends Omarchy stock idle pipeline with custom timeouts.
# References omarchy-os-conf-idle / omarchy-os-conf-idle-resume.

general {
    lock_cmd = omarchy-system-lock
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock
    after_sleep_cmd = sleep 1 && omarchy-system-wake
    inhibit_sleep = 3
}

# Start screensaver after 2.5 minutes
listener {
    timeout = 150
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

# Re-trigger screensaver after 5 minutes (in case dismissed)
listener {
    timeout = 300
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

# Idle pipeline after 2.5 minutes: lock, dim keyboard, DPMS off after 10s
listener {
    timeout = 152
    on-timeout = omarchy-os-conf-idle
    on-resume = omarchy-os-conf-idle-resume
    on-timeout = omarchy-system-lock
    on-resume = omarchy-system-wake
}

# DPMS force off after 7 minutes
listener {
    timeout = 430
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}
