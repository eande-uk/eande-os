# E&E UK — Tiling mode toggle (Layer 3 override)
# Normal mode: Omarchy arrows (default, Layer 1)
# Vim mode: h/j/k/l replaces arrows (Layer 4 toggle via SUPER+SHIFT+V)
# Toggle: erch hyprland toggle tiling-mode

bindd = SUPER SHIFT, V, Toggle tiling mode, exec, \
  erch hyprland toggle tiling-mode \
  --enabled-notification 'Vim mode (h/j/k/l)' \
  --disabled-notification 'Normal mode (arrows)'
